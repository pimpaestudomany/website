<script>
(function () {
  var navToggle = document.getElementById('nav-toggle');
  var navMenu = document.getElementById('nav-menu');

  navToggle.addEventListener('click', function () {
    var open = navToggle.getAttribute('aria-expanded') === 'true';
    navToggle.setAttribute('aria-expanded', String(!open));
    navMenu.hidden = open;
    if (!open && !navMenu.style.width) {
      navMenu.style.width = navMenu.offsetWidth + 'px';
    }
  });

  document.querySelectorAll('.submenu-toggle').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var open = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!open));
      btn.closest('.has-submenu').querySelector('.submenu').hidden = open;
    });
  });

  document.addEventListener('click', function (e) {
    if (!document.getElementById('main-nav').contains(e.target)) {
      navToggle.setAttribute('aria-expanded', 'false');
      navMenu.hidden = true;
    }
  });

  var header = document.querySelector('.site-header');
  var sentinel = document.querySelector('.header-sentinel');
  if (header && sentinel && 'IntersectionObserver' in window) {
    var headerObserver = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        header.classList.toggle('header-compact', !entry.isIntersecting);
      });
    });
    headerObserver.observe(sentinel);
  }

  var logoWrap = document.querySelector('.masthead-logo-wrap');
  var crestSentinel = document.querySelector('.crest-sentinel');
  if (logoWrap && crestSentinel && 'IntersectionObserver' in window) {
    var logoObserver = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        logoWrap.classList.toggle('logo-pinned', !entry.isIntersecting);
      });
    });
    logoObserver.observe(crestSentinel);
  }
})();
</script>
